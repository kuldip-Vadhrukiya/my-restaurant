{% extends "waiter/base_waiter.html" %}
{% load static %}

{% block content %}
<script>document.getElementById('pageTitle') && (document.getElementById('pageTitle').innerText = "Alerts Hub");</script>

<div class="w-full h-full flex flex-col bg-slate-50 relative pb-20">
    <div class="bg-white px-6 py-5 border-b border-slate-200 flex justify-between items-center shrink-0">
        <div>
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Action Inbox</h2>
            <p class="text-[10px] font-bold text-slate-500 mt-1 uppercase tracking-widest">Pending Tasks</p>
        </div>
        <div class="bg-rose-50 border border-rose-100 px-3 py-1.5 rounded-lg flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span>
            <span class="text-[10px] font-black text-rose-600 uppercase">{{ alerts|length }} Active</span>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-4 no-scrollbar">
        {% for alert in alerts %}
        <div class="bg-white border-l-4 border-l-orange-500 rounded-xl p-4 shadow-sm mb-4 flex justify-between items-center">
            <div class="flex items-start gap-4">
                <div class="w-10 h-10 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center border border-orange-100">
                    <i class="fa-solid fa-fire"></i>
                </div>
                <div>
                    <h3 class="text-lg font-black text-slate-800">{{ alert.table }}</h3>
                    <p class="text-sm font-semibold text-slate-600">{{ alert.msg }}</p>
                </div>
            </div>
            <a href="{% url 'waiter_running_orders' %}?table={{ alert.table }}" class="px-5 py-2.5 bg-slate-800 text-white rounded-lg text-xs font-black uppercase">
                View
            </a>
        </div>
        {% empty %}
        <div class="text-center mt-20 text-slate-400">
            <i class="fa-regular fa-bell-slash text-4xl mb-4 opacity-50"></i>
            <p class="font-bold">Inbox Zero</p>
            <p class="text-xs">No pending tasks for you.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
