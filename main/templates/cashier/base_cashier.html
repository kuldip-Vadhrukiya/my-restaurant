{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashier Panel | Rajkot Rasoi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .nav-item { transition: all 0.2s ease-in-out; }
        .nav-item:hover { background-color: rgba(255, 255, 255, 0.05); color: #fff; transform: translateX(4px); }
        .nav-item.active { background-color: #10b981; color: #fff; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex overflow-hidden">

    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col h-full shadow-2xl">
        <div class="h-16 flex items-center px-6 border-b border-slate-800 bg-slate-950/50">
            <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center text-white mr-3">
                <i class="fa-solid fa-calculator"></i>
            </div>
            <span class="text-lg font-black text-white uppercase tracking-wide">Cashier Panel</span>
        </div>

        <div class="flex-1 overflow-y-auto py-4 px-3 space-y-6">
            <div>
                <p class="px-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Billing</p>
                <a href="{% url 'cashier_pos' %}" class="nav-item flex items-center px-3 py-2.5 rounded-lg text-sm font-medium mb-1">
                    <i class="fa-solid fa-desktop w-5 mr-2 opacity-80"></i> Live POS
                </a>
                <a href="{% url 'cashier_settlements' %}" class="nav-item flex items-center px-3 py-2.5 rounded-lg text-sm font-medium mb-1">
                    <i class="fa-solid fa-money-bill-transfer w-5 mr-2 opacity-80"></i> Settlements
                </a>
            </div>
            <div>
                <p class="px-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Logs</p>
                <a href="{% url 'cashier_history' %}" class="nav-item flex items-center px-3 py-2.5 rounded-lg text-sm font-medium mb-1">
                    <i class="fa-solid fa-receipt w-5 mr-2 opacity-80"></i> Sales History
                </a>
            </div>
            <div>
                <p class="px-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Shift</p>
                <a href="{% url 'cashier_day_close' %}" class="nav-item flex items-center px-3 py-2.5 rounded-lg text-sm font-medium mb-1">
                    <i class="fa-solid fa-lock w-5 mr-2 opacity-80"></i> Day Close
                </a>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shadow-sm">
            <h1 class="text-lg font-bold text-slate-800">{% block page_title %}{% endblock %}</h1>
            <a href="{% url 'admin_logout' %}" class="text-sm font-bold text-red-600 hover:bg-red-50 px-4 py-2 rounded-lg border border-red-100">
                <i class="fa-solid fa-power-off mr-2"></i> Logout
            </a>
        </header>
        <main class="flex-1 overflow-y-auto p-8">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const currentPath = window.location.pathname;
            document.querySelectorAll('.nav-item').forEach(item => {
                if (item.getAttribute('href') === currentPath) item.classList.add('active');
            });
        });
    </script>
</body>
</html>
