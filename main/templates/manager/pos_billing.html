{% extends "manager/base_manager.html" %}
{% load static %}

{% block content %}
<div class="h-[calc(100vh-8rem)] flex flex-col md:flex-row gap-4 overflow-hidden fade-in">

    <div class="w-full md:w-20 lg:w-24 bg-white rounded-3xl border border-slate-200 flex flex-col items-center py-6 gap-6 overflow-y-auto no-scrollbar shadow-sm">
        <button onclick="filterPOS('All', 'all')" id="btn-all" class="pos-cat active group flex flex-col items-center gap-2">
            <div class="w-12 h-12 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-500 group-[.active]:bg-emerald-500 group-[.active]:text-white transition-all shadow-sm">
                <i class="fa-solid fa-border-all"></i>
            </div>
            <span class="text-[9px] font-black uppercase text-slate-400 group-[.active]:text-emerald-600">All</span>
        </button>
        
        {% for cat in categories %}
        <button onclick="filterPOS('{{ cat.name|escapejs }}', '{{ cat.id }}')" id="btn-{{ cat.id }}" class="pos-cat group flex flex-col items-center gap-2">
            <div class="w-12 h-12 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-500 group-[.active]:bg-emerald-500 group-[.active]:text-white transition-all shadow-sm">
                <i class="{{ cat.icon|default:'fa-solid fa-utensils' }}"></i>
            </div>
            <span class="text-[9px] font-black uppercase text-slate-400 group-[.active]:text-emerald-600 truncate w-16 text-center" title="{{ cat.name }}">{{ cat.name|slice:":8" }}..</span>
        </button>
        {% endfor %}
    </div>

    <div class="flex-1 flex flex-col gap-4 overflow-hidden">
        <div class="flex gap-4 items-center bg-white p-3 rounded-2xl border border-slate-200 shadow-sm">
            <div class="relative flex-1">
                <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" id="posSearch" onkeyup="searchMenu()" placeholder="Search dish..." class="w-full pl-10 pr-4 py-2 bg-slate-50 border-none rounded-xl text-sm focus:ring-2 focus:ring-emerald-500 outline-none font-medium">
            </div>
            <select id="tableSelect" class="bg-slate-900 text-white text-xs font-bold px-4 py-2.5 rounded-xl outline-none border-none cursor-pointer focus:ring-2 focus:ring-emerald-500">
                <option value="">SELECT TABLE</option>
                <option value="Takeaway">🛍️ Takeaway / Parcel</option>
                <optgroup label="Dine-in Tables">
                    {% for table in tables %}
                        <option value="{{ table.id }}">{{ table.name }} ({{ table.capacity }} Seats)</option>
                    {% endfor %}
                </optgroup>
            </select>
        </div>

        <div class="flex-1 overflow-y-auto pr-2 no-scrollbar">
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4" id="posItemGrid">
                </div>
        </div>
    </div>

    <div class="w-full md:w-80 lg:w-96 bg-white rounded-3xl border border-slate-200 shadow-xl flex flex-col overflow-hidden">
        <div class="p-5 border-b border-slate-100 bg-slate-50/50">
            <div class="flex justify-between items-center">
                <h3 class="font-black text-slate-800 tracking-tight">Current Bill</h3>
                <span id="orderTypeTag" class="text-[10px] font-bold text-emerald-600 bg-emerald-100 px-2 py-0.5 rounded-full uppercase tracking-tighter">Select Table</span>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar" id="cartList">
            <div class="text-center py-20 opacity-20">
                <i class="fa-solid fa-cart-shopping text-5xl mb-4"></i>
                <p class="font-bold">Cart is empty</p>
            </div>
        </div>

        <div class="p-6 bg-slate-50 border-t border-slate-200 space-y-3">
            <div class="flex justify-between text-sm">
                <span class="text-slate-500 font-medium">Subtotal</span>
                <span class="text-slate-800 font-black">₹<span id="subtotal">0</span></span>
            </div>
            <div class="flex justify-between text-sm">
                <span class="text-slate-500 font-medium">GST (5%)</span>
                <span class="text-slate-800 font-black">₹<span id="tax">0</span></span>
            </div>
            <div class="flex justify-between items-center pt-2 border-t border-slate-200">
                <span class="text-base font-black text-slate-900 uppercase">Total</span>
                <span class="text-2xl font-black text-emerald-600 tracking-tight">₹<span id="total">0</span></span>
            </div>

            <div class="grid grid-cols-2 gap-3 mt-4">
                <button onclick="processOrder('KOT')" class="py-3 bg-white border border-slate-200 text-slate-600 rounded-2xl text-xs font-black hover:bg-slate-100 transition shadow-sm active:scale-95 flex justify-center items-center gap-2"><i class="fa-solid fa-fire"></i> KOT ONLY</button>
                <button onclick="processOrder('PAY')" class="py-3 bg-emerald-600 text-white rounded-2xl text-xs font-black shadow-lg shadow-emerald-600/20 hover:bg-emerald-700 transition active:scale-95 flex justify-center items-center gap-2"><i class="fa-solid fa-check-double"></i> PAY & SETTLE</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. DYNAMIC DATA FROM DJANGO DB
    const menuItems = [
        {% for item in menu_items %}
        { 
            id: {{ item.id }}, 
            name: "{{ item.name|escapejs }}", 
            price: {{ item.price }}, 
            cat: "{{ item.category.name|escapejs }}", 
            veg: {% if item.is_veg %}true{% else %}false{% endif %} 
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
    ];

    let cart = [];
    let currentFilter = 'All';

    // 2. Render Functions
    function renderPOSMenu(itemsToRender = menuItems) {
        const grid = document.getElementById('posItemGrid');
        grid.innerHTML = '';
        
        itemsToRender.forEach(item => {
            grid.innerHTML += `
                <div onclick="addToCart(${item.id})" class="bg-white border border-slate-100 p-4 rounded-3xl shadow-sm hover:border-emerald-500 hover:shadow-md transition-all cursor-pointer group relative overflow-hidden animate-fade-in flex flex-col justify-between h-28">
                    <div class="absolute top-2 right-2">
                        <i class="fa-solid fa-square-caret-up text-lg ${item.veg ? 'text-emerald-500' : 'text-red-500'}"></i>
                    </div>
                    <div>
                        <p class="text-xs font-black text-slate-800 leading-tight group-hover:text-emerald-600 mt-2">${item.name}</p>
                    </div>
                    <p class="text-sm font-black text-slate-900">₹${item.price}</p>
                </div>
            `;
        });
    }

    // 3. Filter Logic
    function filterPOS(catName, btnId) {
        currentFilter = catName;
        document.querySelectorAll('.pos-cat').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${btnId}`).classList.add('active');

        const filtered = catName === 'All' ? menuItems : menuItems.filter(i => i.cat === catName);
        renderPOSMenu(filtered);
    }

    // 4. Search Logic
    function searchMenu() {
        const term = document.getElementById('posSearch').value.toLowerCase();
        const filtered = menuItems.filter(i => 
            i.name.toLowerCase().includes(term) && 
            (currentFilter === 'All' || i.cat === currentFilter)
        );
        renderPOSMenu(filtered);
    }

    // 5. Cart Management
    function addToCart(id) {
        const item = menuItems.find(i => i.id === id);
        const existing = cart.find(c => c.id === id);
        if(existing) {
            existing.qty += 1;
        } else {
            cart.push({...item, qty: 1});
        }
        updateCartUI();
    }

    function changeQty(index, amt) {
        cart[index].qty += amt;
        if(cart[index].qty <= 0) cart.splice(index, 1);
        updateCartUI();
    }

    function updateCartUI() {
        const list = document.getElementById('cartList');
        if(cart.length === 0) {
            list.innerHTML = '<div class="text-center py-20 opacity-20"><i class="fa-solid fa-cart-shopping text-5xl mb-4"></i><p class="font-bold">Cart is empty</p></div>';
            document.getElementById('subtotal').innerText = '0';
            document.getElementById('tax').innerText = '0';
            document.getElementById('total').innerText = '0';
            return;
        }
        
        list.innerHTML = '';
        let sub = 0;
        cart.forEach((item, index) => {
            sub += (item.price * item.qty);
            list.innerHTML += `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-2xl border border-slate-100 animate-fade-in">
                    <div class="flex-1 pr-2">
                        <p class="text-xs font-black text-slate-800 leading-tight">${item.name}</p>
                        <p class="text-[10px] text-slate-500 font-bold mt-0.5">₹${item.price} x ${item.qty}</p>
                    </div>
                    <div class="flex items-center gap-2 bg-white rounded-xl border border-slate-200 px-1 py-1 shadow-sm">
                        <button onclick="changeQty(${index}, -1)" class="w-6 h-6 rounded-lg text-slate-500 hover:bg-red-50 hover:text-red-500 transition-all"><i class="fa-solid fa-minus text-[10px]"></i></button>
                        <span class="text-xs font-black text-slate-800 w-4 text-center">${item.qty}</span>
                        <button onclick="changeQty(${index}, 1)" class="w-6 h-6 rounded-lg text-slate-500 hover:bg-emerald-50 hover:text-emerald-500 transition-all"><i class="fa-solid fa-plus text-[10px]"></i></button>
                    </div>
                </div>
            `;
        });

        const taxVal = Math.round(sub * 0.05); // 5% GST
        document.getElementById('subtotal').innerText = sub.toLocaleString();
        document.getElementById('tax').innerText = taxVal.toLocaleString();
        document.getElementById('total').innerText = (sub + taxVal).toLocaleString();
    }

    // 6. REAL AJAX BACKEND SUBMISSION
    function processOrder(type) {
        const tableId = document.getElementById('tableSelect').value;
        if(!tableId) {
            alert("⚠️ Please Select a Table or Takeaway first!");
            document.getElementById('tableSelect').focus();
            return;
        }
        if(cart.length === 0) {
            alert("🛒 Please add items to the cart!");
            return;
        }

        // Send Data to Django Backend
        fetch("{% url 'manager_pos' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({
                type: type, // 'KOT' or 'PAY'
                table: tableId,
                cart: cart
            })
        })
        .then(response => response.json())
        .then(data => {
            if(data.success) {
                alert("🎉 " + data.message + "\nOrder Reference: #INV-" + data.order_id);
                // Clear POS
                cart = [];
                updateCartUI();
                document.getElementById('tableSelect').value = "";
                document.getElementById('orderTypeTag').innerText = "Select Table";
                document.getElementById('orderTypeTag').classList.replace('text-emerald-600', 'text-slate-400');
            } else {
                alert("❌ Error: " + data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert("❌ Something went wrong! Check connection.");
        });
    }

    // Update Tag on Table Select
    document.getElementById('tableSelect').addEventListener('change', function() {
        const val = this.value;
        const tag = document.getElementById('orderTypeTag');
        if(val) {
            const tableName = this.options[this.selectedIndex].text;
            tag.innerText = val === 'Takeaway' ? '🛍️ Parcel' : `🍽️ ${tableName}`;
            tag.classList.replace('text-slate-400', 'text-emerald-600');
        } else {
            tag.innerText = "Select Table";
            tag.classList.replace('text-emerald-600', 'text-slate-400');
        }
    });

    // Initialize Menu
    document.addEventListener('DOMContentLoaded', () => renderPOSMenu());
</script>
{% endblock %}
