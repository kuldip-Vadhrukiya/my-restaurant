{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rajkot Rasoi | Order & Dine</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Next Level Dropdown Animation */
        #mobile-menu {
            display: block;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }
        #mobile-menu.open {
            max-height: 300px;
            opacity: 1;
            pointer-events: auto;
        }

        /* Nav Link Underline Effect */
        .nav-link { position: relative; transition: color 0.3s ease; }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: #10b981;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        .nav-link.active { color: #059669; font-weight: 700; }

        /* Glass effect enhancement */
        .glass-nav { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emerald: { 50: '#ecfdf5', 100: '#d1fae5', 500: '#10b981', 600: '#059669', 700: '#047857' }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 text-gray-800 antialiased flex flex-col min-h-screen">

    <nav class="sticky top-0 z-50 bg-white/80 glass-nav border-b border-gray-100 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">

                <a href="{% url 'home' %}" class="flex items-center gap-3 cursor-pointer group">
                    <div class="bg-emerald-500 p-2 rounded-xl shadow-lg shadow-emerald-200 group-hover:rotate-12 transition-transform duration-300">
                        <i class="fa-solid fa-utensils text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-extrabold text-lg text-gray-900 tracking-tight leading-none">Rajkot Rasoi</h1>
                        <p class="text-[9px] text-emerald-600 font-black uppercase tracking-widest mt-1">Authentic Pure Veg</p>
                    </div>
                </a>

                <div class="hidden md:flex items-center space-x-8 font-semibold text-sm text-gray-500">
                    <a href="{% url 'home' %}" class="nav-link hover:text-emerald-600 transition">Home</a>
                    <a href="{% url 'menu' %}" class="nav-link hover:text-emerald-600 transition">Menu</a>
                    <a href="{% url 'orders_page' %}" class="nav-link hover:text-emerald-600 transition">Orders</a>
                    <a href="{% url 'bill_page' %}" class="nav-link hover:text-emerald-600 transition">Bill</a>

                    <div class="flex items-center gap-2 bg-emerald-50 px-3 py-2 rounded-xl border border-emerald-100 hover:border-emerald-300 transition-colors">
                        <i class="fa-solid fa-globe text-emerald-500 text-xs"></i>
                        <select onchange="changeLanguage(this.value)" class="bg-transparent text-xs font-black text-emerald-700 focus:outline-none cursor-pointer">
                            <option value="en">EN</option>
                            <option value="hi">हिंदी</option>
                            <option value="gu">ગુજરાતી</option>
                        </select>
                    </div>
                </div>

                <div class="md:hidden flex items-center">
                    <button onclick="toggleMobileMenu()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-gray-50 text-gray-600 hover:bg-emerald-50 hover:text-emerald-600 transition-all">
                        <i id="menu-icon" class="fa-solid fa-bars-staggered text-xl"></i>
                    </button>
                </div>

            </div>
        </div>

        <div id="mobile-menu" class="md:hidden bg-white border-b border-gray-100 shadow-2xl overflow-hidden">
            <div class="px-4 py-4 space-y-2">
                <a href="{% url 'home' %}" class="flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-gray-700 hover:bg-emerald-50 hover:text-emerald-600 transition-all">
                    <i class="fa-solid fa-house text-sm opacity-50"></i> Home
                </a>
                <a href="{% url 'menu' %}" class="flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-gray-700 hover:bg-emerald-50 hover:text-emerald-600 transition-all">
                    <i class="fa-solid fa-bowl-food text-sm opacity-50"></i> Menu
                </a>
                <a href="{% url 'orders_page' %}" class="flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-gray-700 hover:bg-emerald-50 hover:text-emerald-600 transition-all">
                    <i class="fa-solid fa-clock-rotate-left text-sm opacity-50"></i> Orders
                </a>
                <a href="{% url 'bill_page' %}" class="flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-gray-700 hover:bg-emerald-50 hover:text-emerald-600 transition-all">
                    <i class="fa-solid fa-file-invoice-dollar text-sm opacity-50"></i> Bill
                </a>
                <div class="pt-2 border-t border-gray-50 mt-2">
                    <div class="flex items-center justify-between bg-emerald-50 p-4 rounded-2xl">
                        <span class="text-xs font-black text-emerald-700 uppercase">Language</span>
                        <div class="flex gap-3">
                            <button onclick="changeLanguage('en')" class="text-xs font-bold text-emerald-600 underline">EN</button>
                            <button onclick="changeLanguage('hi')" class="text-xs font-bold text-gray-400">HI</button>
                            <button onclick="changeLanguage('gu')" class="text-xs font-bold text-gray-400">GU</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1 w-full max-w-7xl mx-auto px-0 sm:px-4 lg:px-8">
        {% block content %}
        {% endblock %}
    </main>

    <script>
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            const icon = document.getElementById('menu-icon');
            menu.classList.toggle('open');
            
            if (menu.classList.contains('open')) {
                icon.classList.replace('fa-bars-staggered', 'fa-xmark');
            } else {
                icon.classList.replace('fa-xmark', 'fa-bars-staggered');
            }
        }

        function changeLanguage(lang) {
            console.log("Language switched to:", lang);
        }

        // Active Link Highlighter
        document.addEventListener("DOMContentLoaded", function() {
            const currentPath = window.location.pathname;
            document.querySelectorAll('.nav-link').forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('active');
                }
            });
        });
    </script>

    {% block scripts %}{% endblock %}

</body>
</html>
